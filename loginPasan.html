<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UE.JRA login pasantias</title>
    <link rel="icon" type="image/x-icon" href="imagenes/Logo_JRA.jpeg">
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-aFq/bzH65dt+w6FI2ooMVUpc+21e0SRygnTpmBvdBgSdnuTN7QbdgL+OapgHtvPp" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <!-- css personalizado -->
    <link href="cssn/styloginLogin.css" rel="stylesheet">
    <!-- sweetalert2 -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.min.css"rel="stylesheet"> -->
</head>
<body  class="bg-primary">
    <nav class="navbar navbar-q>
        <div class="container-fluid">
          <!--  <a class="navbar-brand" href="index.html"><button class="xd"><i class="bi bi-arrow-bar-left"></i></button></a>-->
        </div>
    </nav>
    <section class="container d-flex justify-content-center align-items-center vh-80">
        <div class="hola bg-white p-5 rounded-5">
            <div class="d-flex justify-content-center">
                <img src="imagenes/Logo_JRA.jpeg" alt="escudo de la institucion">
            </div >
            <form id="loginForm" onsubmit="event.preventDefault(); logearse();">
                <div class="text-center fs-1 fw-bold">Login Pasantias</div>
                <div class="input-group mt-4">
                    <div class="input-group-text bg-primary ">
                        <i class="bi bi-person-fill "></i>
                    </div>
                    <input class="form-control" type="text" 
                           placeholder="username" required="true" 
                           id="usuario" 
                           name="usuario"
                           >
                </div>
                <div class="input-group mt-2">
                    <div class="input-group-text bg-primary">
                        <i class="bi bi-key-fill"></i>
                    </div>
                    <input class="form-control" type="password" 
                           placeholder="password" required="true"  
                           id="clave" 
                           name="clave"
                           >
                </div>
                <div class="d-flex justify-content-center mt-4">
                    <button type="submit" 
                           class="btn btn-primary w-100">
                        Ingresar
                    </button>
                </div>
            </form>
            <div class="d-flex justify-content-center mt-5">
                <div>
                   <!-- <a href="loginPro.html">Profesor</a> -->
                    <a href="loginSecre.html">Secretaria</a>
                    <a href="loginAdmin.html">Administrador</a>
                </div>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha2/dist/js/bootstrap.min.js" integrity="sha384-heAjqF+bCxXpCWLa6Zhcp4fu20XoNIA98ecBC1YkdXhszjoejr5y9Q77hIrv8R9i" crossorigin="anonymous"></script>
    <!-- <script src="https://unpkg.com/popper.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.all.min.js"></script>  -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        async function logearse() {
            try {
                const usuario = document.getElementById("usuario").value;
                const clave = document.getElementById("clave").value;
                const t_usu = "5"; // Cambiado a 5 para PERIODISMO

                if (!usuario || !clave) {
                    await Swal.fire({
                        icon: 'warning',
                        title: 'Atención',
                        text: 'Debe ingresar usuario y clave',
                        confirmButtonText: 'Entendido'
                    });
                    return;
                }

                // Mostrar loading
                const loadingSwal = Swal.fire({
                    title: 'Procesando...',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                const params = new URLSearchParams({
                    usuario: usuario,
                    password: clave,
                    t_usu: t_usu
                });

                const response = await fetch(`login.php?${params.toString()}`);
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const contentType = response.headers.get("content-type");
                if (!contentType || !contentType.includes("application/json")) {
                    throw new Error("La respuesta no es JSON válido");
                }

                const data = await response.json();
                console.log('Respuesta del servidor:', data); // Para debugging

                // Cerrar loading
                await loadingSwal.close();

                if (data.success) {
                    await Swal.fire({
                        icon: 'success',
                        title: '¡Bienvenido!',
                        text: data.message,
                        showConfirmButton: false,
                        timer: 1500
                    });
                    window.location.href = data.redirect;
                } else {
                    await Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: data.message || 'Error en el inicio de sesión',
                        confirmButtonText: 'Cerrar'
                    });
                    if (data.redirect) {
                        window.location.href = data.redirect;
                    }
                }

            } catch (error) {
                console.error('Error:', error);
                await Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Hubo un problema al procesar su solicitud: ' + error.message,
                    confirmButtonText: 'Cerrar'
                });
            }
        }
    </script>
</body>
</html>
